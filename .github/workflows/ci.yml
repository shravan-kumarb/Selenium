name: Selenium Cucumber CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tags:
        description: "Cucumber tag filter (e.g. @smoke)"
        required: false
        default: ""

jobs:
  test:
    name: Test (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Chrome is preinstalled on ubuntu-latest. Add firefox if desired.
        browser: [chrome]
    env:
      # Override defaults from CI secrets/vars when present.
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
      BASE_URL: ${{ vars.BASE_URL }}
      API_URL: ${{ vars.API_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: |
          mvn -B test \
            -Dbrowser=${{ matrix.browser }} \
            -Dheadless=true \
            ${{ github.event.inputs.tags && format('-Dcucumber.filter.tags="{0}"', github.event.inputs.tags) || '' }}

      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/
          retention-days: 14

      - name: Upload Surefire reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.browser }}
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload failure screenshots
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: target/screenshots/
          retention-days: 14